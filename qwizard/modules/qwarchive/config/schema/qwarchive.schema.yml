qwstorage.settings:
  type: config_object
  label: 'QW Storage settings'
  mapping:
    storage_plugin:
      type: string
      label: 'Selected storage plugin ID'
    plugin_configuration:
      type: sequence
      label: 'Plugin configurations'
      sequence:
        type: mapping
        label: 'Plugin configuration'
        mapping:
          file_scheme:
            type: string
            label: 'File scheme'
          directory:
            type: string
            label: 'Directory'
          cdn_endpoint:
            type: string
            label: 'CDN endpoint URL'
          api_key:
            type: string
            label: 'API key'
          bucket:
            type: string
            label: 'Bucket name'
          region:
            type: string
            label: 'Region'

qwarchive.settings:
  type: config_object
  label: 'QW Archive Settings'
  mapping:
    inactive_threshold:
      type: string
      label: 'Inactive days threshold'
    enable_cron_archival:
      type: boolean
      label: 'Enable Automated Archival'
    cron_batch_size:
      type: integer
      label: 'Cron Batch Size'
