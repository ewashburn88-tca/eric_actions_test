qwreporting.hompage:
  path: '/admin/qwreporting'
  defaults:
    _title: 'Faculty progress reporting'
    _controller: '\Drupal\qwreporting\Controller\QwreportingController::build'
  requirements:
    _permission: 'access qwreporting'
  options:
    _admin_route: FALSE

qwreporting.group_new:
  path: '/admin/qwreporting/group-new'
  defaults:
    _title: 'New group'
    _form: 'Drupal\qwreporting\Form\GroupEditForm'
  requirements:
    _permission: 'access qwreporting'
  options:
    _admin_route: FALSE

qwreporting.group_edit:
  path: '/admin/qwreporting/{group}/edit'
  defaults:
    _title: 'Edit group'
    _form: 'Drupal\qwreporting\Form\GroupEditForm'
  requirements:
    _permission: 'access qwreporting'
  options:
    _admin_route: FALSE

qwreporting.group_email:
  path: '/admin/qwreporting/{group_id}/email'
  defaults:
    _title: 'Email'
    _form: 'Drupal\qwreporting\Form\GroupEmailForm'
  requirements:
    _permission: 'access qwreporting'
  options:
    _admin_route: FALSE

qwreporting.group_ops:
  path: '/admin/qwreporting/{group_id}/ops'
  defaults:
    _title: 'User Operations'
    _form: 'Drupal\qwreporting\Form\GroupOpsForm'
  requirements:
    _permission: 'access qwreporting'
  options:
    _admin_route: FALSE

