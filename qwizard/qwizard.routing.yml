
qwizard.admin_qwizard:
  path: '/admin/qwizard'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    _title: 'Quiz Wizard Admin'
  requirements:
    _permission: 'administer qwizard'
  options:
    _admin_route: TRUE

qwizard.admin_qwizard.configuration:
  path: '/admin/qwizard/config'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    link_id: 'qwizard.admin_qwizard.configuration'
    _title: 'Configuration'
  requirements:
    _permission: 'administer qwizard'

qwizard.admin_qwizard.structure:
  path: '/admin/qwizard/structure'
  defaults:
    _controller: '\Drupal\system\Controller\SystemController::systemAdminMenuBlockPage'
    link_id: 'qwizard.admin_qwizard.structure'
    _title: 'Quiz Structure'
  requirements:
    _permission: 'administer qwizard'

qwizard.qwizard_settings_form:
  path: '/admin/qwizard/config/qwizardsettings'
  defaults:
    _form: '\Drupal\qwizard\Form\QwizardSettingsForm'
    _title: 'QwizardSettingsForm'
  requirements:
    _permission: 'administer qwizard'
  options:
    _admin_route: TRUE

qwizard.qwizard_cache_form:
  path: '/admin/qwizard/config/qwizardcache'
  defaults:
    _form: '\Drupal\qwizard\Form\QwCacheForm'
    _title: 'QwCacheForm'
  requirements:
    _permission: 'administer qwizard'
  options:
    _admin_route: TRUE

qwizard.initialize_quiz:
  path: '/quiz-start/{qwiz}/{length}/{alt_type}'
  defaults:
    _controller: '\Drupal\qwizard\Controller\QwizController::initializeQuiz'
    _title: 'Initializing your test...'
  requirements:
    _qwizard_access: 'TRUE'
    _qu: 'TRUE'

qwizard.qwiz_take_form:
  path: '/quiz-take/{qwiz_result}'
  defaults:
    _form: '\Drupal\qwizard\Form\QwizTakeForm'
    _title: 'QwizTakeForm'
  requirements:
    _qwizard_access: 'TRUE'
  options:
    parameters:
      qwiz_result:
        type: entity:qwiz_result

qwizard.qwiz_review_form:
  path: '/quiz-review/{qwiz_result}'
  defaults:
    _form: '\Drupal\qwizard\Form\QwizReviewForm'
    _title: 'QwizReviewForm'
  requirements:
    _qwizard_access: 'TRUE'
  options:
    parameters:
      qwiz_result:
        type: entity:qwiz_result

qwizard.quiz_results:
  path: '/quiz-results/{qwiz}/{user}'
  defaults:
    _controller: '\Drupal\qwizard\Controller\QwizController::quizResults'
    _title: 'Your test results'
  requirements:
    _qwizard_access: 'TRUE'
