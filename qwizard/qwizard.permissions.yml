administer qwizard:
  title: 'Administer Quiz Wizard Module'

add question pool entities:
  title: 'Create new Question Pool entities'

administer question pool entities:
  title: 'Administer Question Pool entities'
  description: 'Allow to access the administration form to configure Question Pool entities.'
  restrict access: true

delete question pool entities:
  title: 'Delete Question Pool entities'

edit question pool entities:
  title: 'Edit Question Pool entities'

view published question pool entities:
  title: 'View published Question Pool entities'

view unpublished question pool entities:
  title: 'View unpublished Question Pool entities'

view all question pool revisions:
  title: 'View all Question Pool revisions'

revert all question pool revisions:
  title: 'Revert all Question Pool revisions'
  description: 'Role requires permission <em>view Question Pool revisions</em> and <em>edit rights</em> for question pool entities in question or <em>administer question pool entities</em>.'

