name: Run PHPCS Script

on:
  push:
    branches:
      - main

jobs:
  run-script:
    runs-on: ubuntu-latest

    # https://github.com/actions/checkout
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        permissions:
          contents: read

      - name: Run PHPCS script
        run: ./.github/scripts/phpcs_run.sh